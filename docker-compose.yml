version: "3.9"

services:
  nextjs:
    image: ghcr.io/${GITHUB_REPOSITORY:-kirillmaster/football_site}/nextjs:${IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://fcarsenal92.ru/api/v1
      - NEXT_PUBLIC_GA_ID=${NEXT_PUBLIC_GA_ID}
      - NEXT_PUBLIC_YM_ID=${NEXT_PUBLIC_YM_ID}
    env_file:
      - .env
    depends_on:
      dotnet-api:
        condition: service_healthy
    restart: unless-stopped

  dotnet-api:
    image: ghcr.io/${GITHUB_REPOSITORY:-kirillmaster/football_site}/dotnet-api:${IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
      - ./config/seed-data.json:/app/seed-data.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  uploads_data:
