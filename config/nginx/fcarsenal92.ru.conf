# FC Arsenal-92 — nginx vhost
# Deploy to: /etc/nginx/sites-available/fcarsenal92.ru
# Then: ln -s /etc/nginx/sites-available/fcarsenal92.ru /etc/nginx/sites-enabled/
# Then: certbot --nginx -d fcarsenal92.ru -d www.fcarsenal92.ru

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=arsenal_contact:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=arsenal_tryout:10m  rate=10r/m;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name fcarsenal92.ru www.fcarsenal92.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://fcarsenal92.ru$request_uri;
    }
}

# www → non-www redirect
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.fcarsenal92.ru;

    ssl_certificate     /etc/letsencrypt/live/fcarsenal92.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fcarsenal92.ru/privkey.pem;

    return 301 https://fcarsenal92.ru$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fcarsenal92.ru;

    ssl_certificate     /etc/letsencrypt/live/fcarsenal92.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fcarsenal92.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache   shared:SSL_arsenal:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://mc.yandex.ru; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://www.google-analytics.com https://mc.yandex.ru; frame-src 'self' https://rutube.ru https://*.rutube.ru; frame-ancestors 'none';" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml font/woff font/woff2;

    # Uploads volume
    location /uploads/ {
        alias /var/lib/docker/volumes/football_site_uploads_data/_data/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API rate-limited endpoints
    location = /api/contact {
        limit_req zone=arsenal_contact burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;
    }

    location = /api/tryout {
        limit_req zone=arsenal_tryout burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;
    }

    # .NET API — all /api/* routes go to backend
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 30s;
    }

    # Next.js frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 30s;
    }
}
