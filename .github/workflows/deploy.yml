name: CI/CD Pipeline

on:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Backend tests
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/backend/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore .NET dependencies
        run: dotnet restore src/backend

      - name: Run backend tests
        run: dotnet test src/backend --no-restore --verbosity normal

      # Frontend tests
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: src/frontend

  # ── 2. Build & push images ────────────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (backend)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/dotnet-api
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=backend-v2
          cache-to: type=gha,mode=max,scope=backend-v2

      - name: Extract Docker metadata (frontend)
        id: meta-fe
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nextjs
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-fe.outputs.tags }}
          labels: ${{ steps.meta-fe.outputs.labels }}
          cache-from: type=gha,scope=frontend-v2
          cache-to: type=gha,mode=max,scope=frontend-v2
          build-args: |
            NEXT_PUBLIC_API_URL=https://fcarsenal92.ru

  # ── 3. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,config/seed-data.json,scripts/deploy.sh,config/nginx/fcarsenal92.ru.conf"
          target: /opt/football_site
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            mkdir -p /opt/football_site/config
            cd /opt/football_site

            # Write .env (GITHUB_REPOSITORY lowercased — Docker requires lowercase)
            REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            printf '%s\n' \
              "GITHUB_REPOSITORY=${REPO}" \
              "IMAGE_TAG=sha-${{ github.sha }}" \
              "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
              "S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}" \
              "S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}" \
              "S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}" \
              "S3_BUCKET=${{ secrets.S3_BUCKET }}" \
              "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" \
              "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" \
              "NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }}" \
              "NEXT_PUBLIC_YM_ID=${{ secrets.NEXT_PUBLIC_YM_ID }}" \
              "FRONTEND_URL=https://fcarsenal92.ru" > .env

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Update nginx config and reload
            cp /opt/football_site/config/nginx/fcarsenal92.ru.conf /etc/nginx/sites-available/fcarsenal92.ru
            nginx -t && systemctl reload nginx

            bash scripts/deploy.sh
